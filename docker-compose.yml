services:
  postgres:
    image: postgres:16
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ai-service:
    build: ./ai-service
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app

volumes:
  postgres_data:
  minio_data: